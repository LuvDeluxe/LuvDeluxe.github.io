<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simeon — QA by day. Builder by night.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131f;
    --border: #1e1e32;
    --accent: #00ff88;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --mono: 'JetBrains Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
    cursor: none; /* Hidden by default for desktop custom cursor */
  }

  /* Custom Cursor Elements */
  .cursor {
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    mix-blend-mode: screen;
  }
  .cursor-ring {
    width: 36px; height: 36px;
    border: 1px solid var(--accent);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.18s ease-out, opacity 0.2s;
    opacity: 0.4;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 100;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    padding: 0 24px;
  }
  .nav-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
  }
  .nav-left {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }
  .nav-left .path { color: var(--accent2); }
  .nav-links { display: flex; gap: 24px; }
  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.08em;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }
  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
  }
  .dot {
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-top: 52px;
    position: relative;
  }

  .glow-1 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
    top: 20%; left: -100px;
    pointer-events: none;
  }
  .glow-2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(124,58,237,0.07) 0%, transparent 70%);
    top: 40%; right: -50px;
    pointer-events: none;
  }

  .hero-content { position: relative; z-index: 1; width: 100%; padding: 40px 0 60px; }

  .terminal-prompt {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .terminal-prompt .path { color: var(--accent2); }

  .hero-title {
    font-family: var(--display);
    font-size: clamp(42px, 8vw, 80px);
    font-weight: 800;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .hero-title .name-main { color: var(--text); }
  .hero-title .accent-line {
    color: transparent;
    -webkit-text-stroke: 1px var(--accent);
    display: block;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    margin-top: 18px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tagline::before { content: '>'; color: var(--accent); font-weight: 700; }

  .hero-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }
  .badge {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    background: var(--surface);
  }
  .badge.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.05); }

  .cta-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    border-radius: 2px;
    text-decoration: none;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .btn-primary { background: var(--accent); color: #000; font-weight: 700; }
  .btn-ghost { border-color: var(--border); color: var(--muted); background: transparent; }

  /* MOBILE FIXES */
  @media (max-width: 768px) {
    /* 1. Disable custom cursor on mobile to prevent "stuck" dot */
    body { cursor: auto; }
    .cursor, .cursor-ring { display: none !important; }
    .btn, .app-card, .contact-link { cursor: pointer; }

    /* 2. Center content on mobile */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .terminal-prompt, .hero-badges, .cta-row, .tagline {
      justify-content: center;
    }
    .hero-title .accent-line {
      display: inline-block;
      width: 100%;
    }
    .nav-links { display: none; }
  }

  /* REST OF YOUR STYLES... */
  section { padding: 56px 0; }
  .section-header { display: flex; align-items: center; gap: 16px; margin-bottom: 32px; }
  .section-title { font-family: var(--display); font-size: 26px; font-weight: 800; color: var(--text); }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
  .app-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 6px; }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <div class="nav-inner">
    <div class="nav-left">
      <span class="path">~/simeon</span>
      <span>on</span>
      <span class="branch" style="color:var(--accent3)">⎇ main</span>
    </div>
    <div class="nav-links">
      <a href="#apps">apps</a>
      <a href="#about">about</a>
      <a href="#contact">contact</a>
    </div>
    <div class="status-dot">
      <span class="dot"></span>
      <span>building</span>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="container hero-content">
    <div class="terminal-prompt">
      <span style="color:var(--muted)">❯</span>
      <span style="color:var(--text)">whoami</span>
    </div>
    <h1 class="hero-title">
      <span class="name-main">Breaks Things.</span>
      <span class="accent-line">Then Builds Them.</span>
    </h1>
    <p class="tagline">Senior QA by day. Indie iOS dev by night.</p>
    <div class="hero-badges">
      <span class="badge active">⚡ SwiftUI</span>
      <span class="badge">🔍 QA</span>
      <span class="badge">✈️ Nomad</span>
    </div>
    <div class="cta-row">
      <a href="#apps" class="btn btn-primary">view my apps →</a>
      <a href="#contact" class="btn btn-ghost">get in touch</a>
    </div>
  </div>
</section>

<script>
  // Simple cursor logic for desktop
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursorRing');
  
  document.addEventListener('mousemove', (e) => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    ring.style.left = e.clientX + 'px';
    ring.style.top = e.clientY + 'px';
  });
</script>

</body>
</html>
